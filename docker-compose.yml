services:
  auth-service:
    build: .
    environment:
      - PORT=80
      - BEARER_TOKENS=tokA,tokB,tokC
    # ports:
    #  - "80:80"
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost/health"]
      # test: ["CMD", "curl", "--silent", "--fail", "http://localhost:1234/health"]  # Add port if changed from default 80
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s